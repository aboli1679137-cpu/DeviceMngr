{% extends "base.html" %}
{% block content %}
<div class="space-y-6 max-w-5xl mx-auto" id="detailContent">
    <div class="flex justify-center py-20"><div class="spinner"></div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const deviceId = '{{ device_id }}';
    fetch(`/api/devices/${deviceId}`).then(r=>r.json()).then(d=>{
        if (d.error) {
            document.getElementById('detailContent').innerHTML = `<div class="text-center py-20"><h2 class="text-xl font-semibold text-gray-900">${__('detail.not_found')}</h2><a href="/systems" class="text-blue-600 hover:text-blue-700 mt-2 inline-block">${__('common.back')}</a></div>`;
            return;
        }
        renderDetail(d);
    }).catch(()=>{
        document.getElementById('detailContent').innerHTML = '<div class="text-center py-20 text-gray-500">'+__('common.failed')+'</div>';
    });

    function updateStatus(deviceId, newStatus) {
        fetch('/api/systems/status', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: deviceId, status: newStatus})
        }).then(r=>r.json()).then(()=>{
            showToast(__('toast.status_updated'), 'success');
            window.location.reload();
        }).catch(()=>showToast(__('toast.failed'), 'error'));
    }

    function deleteDevice(deviceId) {
        if (!confirm(__('detail.confirm_delete'))) return;
        fetch(`/api/devices/${deviceId}`, {method:'DELETE'}).then(()=>{
            showToast(__('toast.system_deleted'), 'success');
            window.location.href = '/systems';
        }).catch(()=>showToast(__('toast.failed'), 'error'));
    }

    function renderDetail(d) {
        const specs = [
            {label:__('hw.cpu'), value:d.cpu, icon:'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'},
            {label:__('hw.ram'), value:d.ram, icon:'M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4'},
            {label:__('hw.gpu'), value:d.gpu, icon:'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'},
            {label:__('hw.storage'), value:d.storage, icon:'M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4'},
            {label:__('hw.motherboard'), value:d.motherboard, icon:'M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4'},
            {label:__('hw.power_supply'), value:d.power_supply, icon:'M13 10V3L4 14h7v7l9-11h-7z'},
            {label:__('hw.case'), value:d.case_field, icon:'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10'},
            {label:__('hw.condition'), value:d.condition_field, icon:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'}
        ];

        const statusOptions = ['READY','IN_REPAIR','DAMAGED','DELIVERED','SOLD','PENDING_INSPECTION','TESTED','ARCHIVED'];

        document.getElementById('detailContent').innerHTML = `
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()" class="btn-ghost p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
                    </button>
                    <div>
                        <div class="flex items-center gap-3 flex-wrap">
                            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">${d.name}</h1>
                            <select onchange="updateStatus('${d.id}', this.value)" class="text-xs border rounded-full px-2.5 py-0.5 font-medium bg-white dark:bg-gray-800" style="padding-right:24px;appearance:none;cursor:pointer">
                                ${statusOptions.map(s => `<option value="${s}" ${s===d.status?'selected':''}>${tStatusLabel(s)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="flex items-center gap-2 mt-1 flex-wrap">
                            ${categoryBadge(d.category)}
                            ${d.sub_category ? `<span class="badge ${d.sub_category==='TESTING'?'bg-cyan-100 text-cyan-700 border-cyan-300':'bg-indigo-100 text-indigo-700 border-indigo-300'}">${tStatusLabel('sub.'+d.sub_category)} ${d.sub_category==='TESTING' ? __('sub.TESTING') : __('sub.SHOP_USE')}</span>` : ''}
                            ${d.serial_number ? `<span class="text-xs text-gray-400" dir="ltr">S/N: ${d.serial_number}</span>` : ''}
                            ${d.customer_name ? `<span class="text-xs text-gray-400">${__('detail.customer')}: ${d.customer_name}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/repair?deviceId=${d.id}" class="btn-secondary text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        ${__('detail.create_repair')}
                    </a>
                    <button onclick="deleteDevice('${d.id}')" class="btn-danger text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        ${__('common.delete')}
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="card p-6">
                        <p class="section-label">${__('detail.hardware_specs')}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${specs.map(s => `
                                <div class="flex items-start gap-3 p-3 rounded-lg bg-gray-50 dark:bg-gray-800/50">
                                    <div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-950/50 flex items-center justify-center flex-shrink-0">
                                        <svg class="w-4 h-4 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s.icon}"/></svg>
                                    </div>
                                    <div class="min-w-0">
                                        <p class="text-xs text-gray-500">${s.label}</p>
                                        <p class="text-sm font-medium text-gray-900 dark:text-white truncate">${s.value || '—'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${d.notes ? `
                    <div class="card p-6">
                        <p class="section-label">${__('detail.notes')}</p>
                        <p class="text-sm text-gray-700 whitespace-pre-wrap">${d.notes}</p>
                    </div>` : ''}

                    ${d.repairs && d.repairs.length > 0 ? `
                    <div class="card p-6">
                        <p class="section-label">${__('detail.repair_history')} (${d.repairs.length})</p>
                        <div class="space-y-3">
                            ${d.repairs.map(r => `
                                <a href="/repair/${r.id}" class="flex items-center justify-between p-3 rounded-lg bg-amber-50 dark:bg-amber-950/20 hover:bg-amber-100 dark:hover:bg-amber-950/40 transition-colors">
                                    <div class="min-w-0">
                                        <p class="text-sm font-medium text-gray-900 truncate">${r.issue_description || __('repair.detail.title')}</p>
                                        <p class="text-xs text-gray-500">${r.assigned_technician ? __('common.tech')+': '+r.assigned_technician+' · ' : ''}${formatDateTime(r.entry_date)}</p>
                                    </div>
                                    ${statusBadge(r.repair_status)}
                                </a>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    ${d.activities && d.activities.length > 0 ? `
                    <div class="card p-6">
                        <p class="section-label">${__('detail.activity_log')}</p>
                        <div class="space-y-2">
                            ${d.activities.map(a => `
                                <div class="flex items-start gap-3 text-sm">
                                    <div class="w-6 h-6 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center flex-shrink-0 mt-0.5">
                                        <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                    </div>
                                    <div class="min-w-0">
                                        <p class="text-gray-700 dark:text-gray-300">${a.description || a.action}</p>
                                        <p class="text-xs text-gray-400">${formatDateTime(a.created_at)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}
                </div>

                <div class="space-y-6">
                    <div class="card p-6">
                        <p class="section-label">${__('detail.system_info')}</p>
                        <div class="space-y-3">
                            <div><p class="text-xs text-gray-500">${__('detail.entry_date')}</p><p class="text-sm font-medium text-gray-900">${formatDateTime(d.entry_date)}</p></div>
                            <div class="border-t pt-3"><p class="text-xs text-gray-500">${__('detail.created')}</p><p class="text-sm font-medium text-gray-900">${formatDateTime(d.created_at)}</p></div>
                            <div class="border-t pt-3"><p class="text-xs text-gray-500">${__('detail.last_updated')}</p><p class="text-sm font-medium text-gray-900">${formatDateTime(d.updated_at)}</p></div>
                            ${d.customer_name ? `<div class="border-t pt-3"><p class="text-xs text-gray-500">${__('detail.customer')}</p><p class="text-sm font-medium text-gray-900">${d.customer_name}</p></div>` : ''}
                            <div class="border-t pt-3"><p class="text-xs text-gray-500">${__('detail.repairs')}</p><p class="text-sm font-medium text-gray-900">${(d.repairs||[]).length}</p></div>
                        </div>
                    </div>
                    <div class="card p-6">
                        <p class="section-label">${__('detail.quick_actions')}</p>
                        <a href="/repair?deviceId=${d.id}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors w-full text-left">
                            <div class="w-8 h-8 rounded-lg bg-amber-100 dark:bg-amber-950/50 flex items-center justify-center">
                                <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </div>
                            <div><p class="text-sm font-medium text-gray-700">${__('detail.create_repair')}</p><p class="text-xs text-gray-400">${__('detail.repair_tip')}</p></div>
                        </a>
                    </div>
                </div>
            </div>
        `;
    }
</script>
{% endblock %}
