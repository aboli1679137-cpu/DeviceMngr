{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white" data-i18n="systems.title">All Systems</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" id="systemsCount" data-i18n="common.loading">Loading...</p>
        </div>
        <a href="/add-system" class="btn-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span data-i18n="add.register">Add New System</span>
        </a>
    </div>

    <div class="glass rounded-xl p-4 border">
        <div class="flex flex-wrap items-center gap-3">
            <div class="relative flex-1 min-w-[200px]">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="searchInput" class="input-field pl-10" data-i18n-placeholder="systems.search" placeholder="Search by name, serial number, or hardware..." onkeydown="if(event.key==='Enter') loadSystems()">
            </div>
            <select id="filterCategory" class="input-field min-w-[160px]" onchange="loadSystems()">
                <option value="" data-i18n="systems.all_categories">All Categories</option>
                <option value="CUSTOMER" data-i18n="category.CUSTOMER">Customer System</option>
                <option value="FOR_SALE" data-i18n="category.FOR_SALE">For Sale</option>
                <option value="INTERNAL" data-i18n="category.INTERNAL">Internal Use</option>
            </select>
            <select id="filterStatus" class="input-field min-w-[160px]" onchange="loadSystems()">
                <option value="" data-i18n="systems.all_statuses">All Statuses</option>
                <option value="READY" data-i18n="status.READY">Ready</option>
                <option value="IN_REPAIR" data-i18n="status.IN_REPAIR">In Repair</option>
                <option value="DAMAGED" data-i18n="status.DAMAGED">Damaged</option>
                <option value="DELIVERED" data-i18n="status.DELIVERED">Delivered</option>
                <option value="SOLD" data-i18n="status.SOLD">Sold</option>
                <option value="PENDING_INSPECTION" data-i18n="status.PENDING_INSPECTION">Pending Inspection</option>
                <option value="TESTED" data-i18n="status.TESTED">Tested</option>
                <option value="ARCHIVED" data-i18n="status.ARCHIVED">Archived</option>
            </select>
        </div>
    </div>

    <div id="systemsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const urlParams = new URLSearchParams(window.location.search);

    document.addEventListener('DOMContentLoaded', function() {
        if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
        if (urlParams.get('category')) document.getElementById('filterCategory').value = urlParams.get('category');
        if (urlParams.get('status')) document.getElementById('filterStatus').value = urlParams.get('status');
        loadSystems();
    });

    function loadSystems() {
        const params = new URLSearchParams();
        const search = document.getElementById('searchInput').value;
        const cat = document.getElementById('filterCategory').value;
        const status = document.getElementById('filterStatus').value;
        if (search) params.set('search', search);
        if (cat) params.set('category', cat);
        if (status) params.set('status', status);

        const grid = document.getElementById('systemsGrid');
        grid.innerHTML = '<div class="col-span-full flex justify-center py-20"><div class="spinner"></div></div>';

        fetch('/api/devices?' + params.toString())
            .then(r => r.json())
            .then(devices => {
                document.getElementById('systemsCount').textContent = `${devices.length} ${__('systems.count')}`;
                if (devices.length === 0) {
                    grid.innerHTML = `<div class="col-span-full card p-12 text-center">
                        <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <h3 class="text-lg font-semibold text-gray-900 mb-1">${__('systems.no_results')}</h3>
                        <p class="text-sm text-gray-500">${search || cat || status ? __('systems.adjust_filters') : __('systems.add_first')}</p>
                        <a href="/add-system" class="btn-primary mt-4 inline-flex"><span data-i18n="add.register">${__('add.register')}</span></a>
                    </div>`;
                    return;
                }
                grid.innerHTML = devices.map(d => `
                    <a href="/systems/${d.id}" class="card p-5 hover:shadow-md transition-all group">
                        <div class="flex items-start justify-between mb-3">
                            <div class="min-w-0 flex-1">
                                <h3 class="font-semibold text-gray-900 truncate group-hover:text-blue-600 transition-colors">${d.name}</h3>
                                ${d.serial_number ? `<p class="text-xs text-gray-400 mt-0.5">${__('common.s_n')}: ${d.serial_number}</p>` : ''}
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${categoryBadge(d.category)}
                            ${d.sub_category ? `<span class="badge ${d.sub_category === 'TESTING' ? 'bg-cyan-100 text-cyan-700 border-cyan-300' : 'bg-indigo-100 text-indigo-700 border-indigo-300'}">${d.sub_category === 'TESTING' ? __('sub.TESTING') : __('sub.SHOP_USE')}</span>` : ''}
                            ${statusBadge(d.status)}
                        </div>
                        <div class="space-y-1 text-xs text-gray-500">
                            ${d.cpu ? `<p>CPU: ${d.cpu}</p>` : ''}
                            ${d.ram ? `<p>RAM: ${d.ram}</p>` : ''}
                            ${d.gpu ? `<p>GPU: ${d.gpu}</p>` : ''}
                        </div>
                        <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                            <span class="text-xs text-gray-400">${formatDate(d.entry_date)}</span>
                            <span class="text-xs text-gray-400">${d.repairs_count > 0 ? d.repairs_count + ' ' + __('common.repairs') : __('common.no_repairs')}</span>
                        </div>
                    </a>
                `).join('');
            })
            .catch(() => {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">'+__('common.failed')+'</div>';
            });
    }
</script>
{% endblock %}
